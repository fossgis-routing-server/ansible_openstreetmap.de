---
# Role defaults — only variables that are SHARED across both
# valhalla_service and valhalla_builder hosts (or that the cross-host
# wiring needs to read via hostvars[...]) live here.
#
# Group-scoped variables live in:
#   - group_vars/valhalla_service.yml — hostnames, ports, web app, deploy pubkeys, ...
#   - group_vars/valhalla_builder.yml — planet URL, build paths, tarball, build-loop sleep, ...
#
# When adding a new variable, prefer the narrowest scope that works.

# Service-runtime identity. ONLY runs the network-facing services:
# valhalla-{port} (valhalla_service) on v1. On v2 it has no running
# service — present only as the owner of /srv/valhalla itself (the
# sgid bucket) for symmetric account topology across hosts.
valhalla__user: valhalla

# Deploy/build/data identity. Owns and writes:
#   - /src/valhalla, /src/prime_server, /srv/valhalla/local
#   - /srv/valhalla/data (on v2), /srv/valhalla/scripts
#   - /srv/valhalla/web-app, /var/www/valhalla (on v1)
#   - /srv/valhalla-deploy ($HOME — orchestrator SSH key on v2, tarball drop on v1)
# Runs the build-tiles loop on v2 (User=valhalla-deploy in systemd) and
# receives the orchestrator SSH login on v1. Separates the long-lived
# internet-facing valhalla_service identity from anything that touches
# disk during a build/deploy, so a service-side RCE can't self-overwrite
# its own binary.
valhalla__deploy_user: valhalla-deploy
valhalla__deploy_user_home: /srv/valhalla-deploy

# Semantic alias for tasks that do build work — they use `become_user:
# valhalla__build_user`. Defaults to the deploy user on both hosts;
# build/install is a deploy-time concern, so the deploy identity is
# the natural owner of the build tree.
valhalla__build_user: "{{ valhalla__deploy_user }}"

# Source checkout (overridable to a specific sha for reproducibility).
valhalla__git_repo: https://github.com/valhalla/valhalla.git
valhalla__git_version: master

# Shared filesystem layout. valhalla__basedir lives in
# group_vars/valhalla.yml so monitoring.yml (which doesn't include this
# role) can also see it via its parent valhalla:children group.
valhalla__srcdir: /src/valhalla

# Install prefix for the rebuilt valhalla binaries + libs (also for
# prime_server on v1). Owned by valhalla-deploy so `make install`
# needs no sudo. systemd units + the build-tiles loop find the binaries
# via PATH + LD_LIBRARY_PATH wired off this var.
valhalla__prefix: "{{ valhalla__basedir }}/local"

valhalla__monitoring_in_use: false

# Pinned statsd_exporter release. Debian Trixie doesn't package it, so
# we install the Go binary from the upstream GitHub release tarball.
valhalla__statsd_exporter_version: "0.29.0"
