---
# Role defaults — only variables that are SHARED across both
# valhalla_service and valhalla_builder hosts (or that the cross-host
# wiring needs to read via hostvars[...]) live here.
#
# Group-scoped variables live in:
#   - group_vars/valhalla_service.yml — hostnames, ports, web app, deploy pubkeys, ...
#   - group_vars/valhalla_builder.yml — planet URL, build paths, tarball, build-loop sleep, ...
#
# When adding a new variable, prefer the narrowest scope that works.

# Service user that owns /src/valhalla and /srv/valhalla on both hosts.
valhalla__user: valhalla

# Source checkout (overridable to a specific sha for reproducibility).
valhalla__git_repo: https://github.com/valhalla/valhalla.git
valhalla__git_version: master

# Shared filesystem layout.
valhalla__srcdir: /src/valhalla
valhalla__basedir: /srv/valhalla

# Monitoring threshold for both the build and apply sentinels.
# munin/icinga/prometheus alert when either is older than this.
valhalla__sentinel_max_age_hours: 16

# System user on the service host that receives graph pushes from the
# builder. The username is defined here (not under valhalla_service)
# because the builder's build-tiles-loop script needs to know who to
# SSH as. The home dir is only meaningful on the service host (where
# the account exists), but kept alongside for symmetry.
valhalla__graph_user: valhalla-graph
valhalla__graph_user_home: /srv/valhalla-graph

# GHA-driven deploy account. Created on both hosts: valhalla1 holds the
# 3 GHA-trigger forced-command keys; valhalla2 holds the from=-restricted
# rebuild-trigger key (and the private half of the SSH-jump key lives
# under valhalla1's copy of this home dir).
valhalla__deploy_user: valhalla-deploy
valhalla__deploy_user_home: /srv/valhalla-deploy

# IP this host shows up as from the perspective of the peer (used as
# the `from=` restriction in the cross-host authorized_keys). Defaults
# to the default-route IPv4 from gathered facts, which is what the
# peer will see in the public/normal-network case. Override per-host
# only when the peer-facing IP differs from default_ipv4 — e.g.
# vagrant uses a private_network for VM↔VM traffic that is NOT the
# default route.
valhalla__public_ipv4: "{{ ansible_default_ipv4.address }}"

valhalla__monitoring_in_use: false

# Pinned statsd_exporter release. Debian Trixie doesn't package it, so
# we install the Go binary from the upstream GitHub release tarball.
valhalla__statsd_exporter_version: "0.29.0"
