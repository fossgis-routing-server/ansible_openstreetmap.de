# SPDX-License-Identifier: MIT
# Handlers triggered by the valhalla role. Kept here rather than relying
# on cross-role handler resolution to make the dependency explicit.
---

- name: restart statsd-exporter
  ansible.builtin.systemd_service:
    name: statsd-exporter
    state: restarted
    daemon_reload: true

- name: restart mtail
  ansible.builtin.systemd_service:
    name: mtail
    state: restarted
    daemon_reload: true
