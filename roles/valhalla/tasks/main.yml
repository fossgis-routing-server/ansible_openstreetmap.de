---
- name: "Common setup (both hosts)"
  include_tasks: "common.yml"

- name: "Graph Builder host setup"
  include_tasks: "builder.yml"
  when: "inventory_hostname in groups['valhalla_builder']"

- name: "Graph Builder loop + graph push"
  include_tasks: "tiles_loop.yml"
  when: "inventory_hostname in groups['valhalla_builder']"

- name: "Service host setup"
  include_tasks: "service.yml"
  when: "inventory_hostname in groups['valhalla_service']"

- name: "Service host apply-graph receiver"
  include_tasks: "apply_graph.yml"
  when: "inventory_hostname in groups['valhalla_service']"

- name: "Service host deploy account + scripts"
  include_tasks: "deploy_service.yml"
  when: "inventory_hostname in groups['valhalla_service']"

- name: "Builder host deploy account + scripts"
  include_tasks: "deploy_builder.yml"
  when: "inventory_hostname in groups['valhalla_builder']"

- name: "Web app (service host)"
  include_tasks: "web.yml"
  when: "inventory_hostname in groups['valhalla_service']"

- name: "Frontend nginx (service host)"
  include_tasks: "frontend.yml"
  when: "inventory_hostname in groups['valhalla_service']"

- name: "Munin plugins (per-host gating inside)"
  include_tasks: "munin.yml"

- name: "Prometheus monitoring (node_exporter, statsd_exporter, mtail)"
  include_tasks: "prometheus.yml"
  when: valhalla__monitoring_in_use | default(False)
