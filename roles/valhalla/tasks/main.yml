---
- name: "Common setup (both hosts)"
  include_tasks: "common.yml"

- name: "Graph Builder host setup"
  include_tasks: "builder.yml"
  when: "inventory_hostname in groups['valhalla_builder']"

- name: "Graph Builder loop + graph push"
  include_tasks: "tiles_loop.yml"
  when: "inventory_hostname in groups['valhalla_builder']"

- name: "Service host setup"
  include_tasks: "service.yml"
  when: "inventory_hostname in groups['valhalla_service']"

- name: "Service host deploy account (orchestrator target)"
  include_tasks: "deploy.yml"
  when: "inventory_hostname in groups['valhalla_service']"

- name: "Web app (service host)"
  include_tasks: "web.yml"
  when: "inventory_hostname in groups['valhalla_service']"

- name: "Frontend nginx (service host)"
  include_tasks: "frontend.yml"
  when: "inventory_hostname in groups['valhalla_service']"

- name: "Self-hosted Let's Encrypt (service host — diverges from org's robinson-centralised flow)"
  # Must run AFTER frontend.yml: certbot --webroot needs the custom HTTP
  # server blocks (rendered by frontend.yml + reload nginx) to serve the
  # /.well-known/acme-challenge/ path. On first run the snake-oil certs
  # dropped by common's acme_cert_client task keep nginx start-able until
  # certbot's deploy-hook overwrites them. Gated on a toggle so vagrant
  # (no public DNS) can opt out — see host_vars/valhalla-service.yml.
  include_tasks: "tls.yml"
  when:
    - "inventory_hostname in groups['valhalla_service']"
    - valhalla__letsencrypt_in_use | default(False)

# Munin is currently disabled — uncomment to re-enable (also uncomment
# the meta dep in meta/main.yml + the `name: munin` entry in
# group_vars/valhalla_{service,builder}.yml).
# - name: "Munin plugins (per-host gating inside)"
#   include_tasks: "munin.yml"

- name: "Prometheus monitoring (node_exporter, statsd_exporter, mtail)"
  include_tasks: "prometheus.yml"
  when: valhalla__ext_prometheus_in_use | default(False)
