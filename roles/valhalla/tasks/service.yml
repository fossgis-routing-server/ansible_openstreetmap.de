# SPDX-License-Identifier: MIT
# Service host (valhalla1): build deps, prime_server, valhalla service build,
# two systemd units (one per port in valhalla__service_ports) — both run side
# by side at steady state. The valhalla-deploy account that the builder
# SSHes into (drops tarball, runs apply-graph, runs deploy-{valhalla,web}.sh)
# is created in deploy.yml along with apply-graph.sh and the sudoers.
# nginx (frontend.yml) load-balances over both upstreams with passive health
# checks, so there is no "active port" state file — apply-graph just stops/
# swaps/starts each instance in turn.
---

- name: Install valhalla service prerequisites
  apt:
    name:
      - cmake
      - ccache
      - unzip
      - git
      - coreutils
      - curl
      - g++
      - gcc
      - libboost-all-dev
      - libcurl4-openssl-dev
      - libczmq-dev
      - libgeotiff-dev
      - liblz4-dev
      - libprotobuf-dev
      - libzmq3-dev
      - make
      - pkgconf
      - protobuf-compiler
      - rsync
      - zstd
      - zlib1g-dev
    state: present

# prime_server master is fine
- name: Checkout prime_server source (fresh-host seed only)
  # Same `update: no` + no-`force` pattern as the valhalla checkout below:
  # avoid wedging submodule state under `.git/modules/` on re-runs after
  # a transient submodule-fetch failure. To pull a newer prime_server
  # master, `sudo rm -rf {{ valhalla__prime_server_srcdir }}` first.
  git:
    repo: https://github.com/kevinkreiser/prime_server.git
    dest: "{{ valhalla__prime_server_srcdir }}"
    version: master
    # Full clone — see valhalla checkout below for the rationale.
    recursive: yes
    update: no
  register: valhalla_prime_server_src
  become: yes
  become_user: "{{ valhalla__build_user }}"

- name: Clear stale prime_server build dir on source change
  file:
    path: "{{ valhalla__prime_server_srcdir }}/build"
    state: absent
  when: valhalla_prime_server_src.changed

- name: Check whether prime_server is installed at the current prefix
  # Drives the (re)build below. valhalla finds prime_server with
  # pkg_check_modules(libprime_server) fed by deploy-valhalla.sh's
  # -DCMAKE_PREFIX_PATH={{ valhalla__prefix }}, so the .pc must live at
  # {{ valhalla__prefix }}/lib/pkgconfig. After a basedir/prefix change the
  # new prefix has none (prime_server was installed under the old prefix),
  # so without this gate ansible would never reinstall it there.
  stat:
    path: "{{ valhalla__prefix }}/lib/pkgconfig/libprime_server.pc"
  register: valhalla_prime_server_pc

- name: (Re)build + install prime_server into {{ valhalla__prefix }}
  # Fires on a fresh source clone OR when the current prefix has no
  # prime_server. Re-passing CMAKE_INSTALL_PREFIX re-points the install on
  # the existing build tree (no `creates:` — must reconfigure to pick up a
  # changed prefix). `make` is a near no-op when nothing recompiled; the
  # prefix change only affects where `install` copies files.
  shell:
    cmd: >
      cmake -S {{ valhalla__prime_server_srcdir }} -B {{ valhalla__prime_server_srcdir }}/build
      -DCMAKE_BUILD_TYPE=Release
      -DCMAKE_INSTALL_PREFIX={{ valhalla__prefix }} &&
      make -C {{ valhalla__prime_server_srcdir }}/build -j {{ ansible_facts.processor_vcpus }} &&
      make -C {{ valhalla__prime_server_srcdir }}/build install
  when: valhalla_prime_server_src.changed or not valhalla_prime_server_pc.stat.exists
  become: yes
  become_user: "{{ valhalla__build_user }}"

# valhalla source — independent checkout from the builder's; same git_version.

- name: Checkout valhalla source (fresh-host seed only)
  git:
    repo: "{{ valhalla__git_repo }}"
    dest: "{{ valhalla__srcdir }}"
    version: "{{ valhalla__git_version }}"
    # Full clone, always — no `depth` / `single_branch`. The bandwidth
    # savings of shallow weren't worth the recurring submodule-fetch
    # weirdness (`upload-pack: not our ref <SHA>` on third_party/just_gtfs,
    # never reproducible in a standalone `git clone --recurse-submodules`).
    # ~200 MB extra disk per host, one-time clone cost. Subsequent updates
    # go through deploy-valhalla.sh's in-repo `git fetch + pull`.
    recursive: yes
    # update: no  → only clone if dest is missing. Subsequent updates
    # (branch advances, SHA bumps) flow through deploy-valhalla.sh's
    # in-repo `git fetch + pull + submodule update`. Deliberately NOT
    # using `force: yes` because ansible's git module doesn't clean
    # `.git/modules/<submodule>/` on force, which can wedge submodule
    # state across re-runs after a transient submodule-fetch failure.
    # Recovery from a wedged state: `sudo rm -rf {{ valhalla__srcdir }}`
    # then re-run ansible.
    update: no
  become: yes
  become_user: "{{ valhalla__build_user }}"

- name: Build + install valhalla
  command: "{{ valhalla__basedir }}/scripts/deploy-valhalla.sh service"
  become: yes
  become_user: "{{ valhalla__build_user }}"

