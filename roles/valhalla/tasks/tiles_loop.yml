# SPDX-License-Identifier: MIT
# Builder host: endless build-tiles loop running as valhalla-deploy.
# Each iteration:
#   0. rebuild of valhalla C++ (this host) and remote rebuild of
#      valhalla C++ + web-app on the service host via SSH.
#   1. valhalla_build_tiles -c valhalla.json planet.pbf
#   2. tar+zstd the tiles dir
#   3. rsync the tarball to the service host's valhalla-deploy $HOME
#   4. ssh the service host and run apply-graph.sh (no forced cmd)
#   5. pyosmium-up-to-date the planet.pbf
# The SSH key generated here lives under valhalla-deploy's $HOME and is
# authorized (no key_options) on the service host's valhalla-deploy
# account by deploy.yml.
---

- name: Generate SSH key for the builder → service-host channel
  # The pubkey ends up at {{ valhalla__deploy_user_home }}/.ssh/id_valhalla_deploy.pub.
  # deploy.yml on valhalla1 slurps it from there via delegate_to.
  user:
    name: "{{ valhalla__deploy_user }}"
    generate_ssh_key: yes
    ssh_key_type: ed25519
    ssh_key_file: ".ssh/id_valhalla_deploy"
    ssh_key_comment: "valhalla builder from {{ inventory_hostname }}"

- name: Build-tiles iteration script (what operators edit)
  # This is where the actual work lives. The wrapper below spawns a
  # fresh bash for it each loop, so edits here land automatically on
  # the next iteration of graph build
  template:
    src: build-tiles-iteration.sh.j2
    dest: "{{ valhalla__basedir }}/scripts/build-tiles-iteration.sh"
    owner: "{{ valhalla__deploy_user }}"
    group: "{{ valhalla__user }}"
    mode: "0755"

- name: Build-tiles loop wrapper (the long-lived systemd target)
  # Tiny — just `while true; do build-tiles-iteration.sh; done`.
  template:
    src: build-tiles-loop.sh.j2
    dest: "{{ valhalla__basedir }}/scripts/build-tiles-loop.sh"
    owner: "{{ valhalla__deploy_user }}"
    group: "{{ valhalla__user }}"
    mode: "0755"

- name: Install build-tiles systemd unit
  systemd_service:
    name: valhalla-build-tiles
    enabled: true
    state: started
    service:
      Unit:
        Description: Valhalla tile build loop
        After: network-online.target
        # if we have repeated failures, we set a systemd failure
        StartLimitBurst: 3
        StartLimitIntervalSec: 600
      Service:
        Type: simple
        User: "{{ valhalla__deploy_user }}"
        Group: "{{ valhalla__deploy_user }}"
        Environment: "PATH={{ valhalla__prefix }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin LD_LIBRARY_PATH={{ valhalla__prefix }}/lib"
        ExecStart: "/bin/bash {{ valhalla__basedir }}/scripts/build-tiles-loop.sh"
        Restart: always
        RestartSec: 60
      # start service on every boot
      Install:
        WantedBy: multi-user.target
