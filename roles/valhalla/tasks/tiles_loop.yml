# SPDX-License-Identifier: MIT
# Builder host: endless build-tiles loop. Each iteration:
#   1. valhalla_build_tiles -c valhalla.json planet.pbf
#   2. tar+zstd the tiles dir
#   3. rsync the tarball to the service host
#   4. ssh the service host (forced command runs apply-graph.sh)
#   5. pyosmium-up-to-date the planet.pbf
# The SSH key generated here is registered as a fact and authorized on the
# service host's valhalla-graph account by service.yml.
---

- name: Generate SSH key for graph push
  # The pubkey ends up at {{ valhalla__basedir }}/.ssh/id_valhalla_graph.pub.
  # apply_graph.yml on valhalla1 slurps it from there via delegate_to
  user:
    name: "{{ valhalla__user }}"
    generate_ssh_key: yes
    ssh_key_type: ed25519
    ssh_key_file: ".ssh/id_valhalla_graph"
    ssh_key_comment: "valhalla graph push from {{ inventory_hostname }}"

- name: Build-tiles loop script
  template:
    src: build-tiles-loop.sh.j2
    dest: "{{ valhalla__basedir }}/scripts/build-tiles-loop.sh"
    owner: "{{ valhalla__user }}"
    group: "{{ valhalla__user }}"
    mode: "0755"

- name: Install build-tiles systemd unit
  systemd_service:
    name: valhalla-build-tiles
    enabled: true
    state: started
    service:
      Unit:
        Description: Valhalla tile build loop
        After: network-online.target
        # if we have repeated failures, we set a systemd failure
        # valhalla__sentinel_path catches osm data failures
        StartLimitBurst: 3
        StartLimitIntervalSec: 600
      Service:
        Type: simple
        User: "{{ valhalla__user }}"
        Group: "{{ valhalla__user }}"
        ExecStart: "/bin/bash {{ valhalla__basedir }}/scripts/build-tiles-loop.sh"
        Restart: always
        RestartSec: 60
      # Without an Install section the unit ends up `static`, which makes
      # `systemctl enable` a no-op — meaning a freshly-provisioned host
      # never auto-starts the loop and a maintainer has to `systemctl
      # start` manually. WantedBy=multi-user.target turns it into a
      # properly enable-able unit that comes up on every boot.
      Install:
        WantedBy: multi-user.target
