# SPDX-License-Identifier: MIT
# Builder host (valhalla2): build deps, valhalla checkout/build, planet
# download, build-artifacts (admins/timezones/elevation). The endless
# build-tiles loop itself lives in tiles_loop.yml (sub-task 4).
---

- name: Install valhalla build prerequisites
  apt:
    name:
      - spatialite-bin
      - wget
      - cmake
      - ccache
      - unzip
      - git
      - luajit
      - jq
      - coreutils
      - curl
      - g++
      - gcc
      - libboost-all-dev
      - libcurl4-openssl-dev
      - libgeos-dev
      - libluajit-5.1-dev
      - liblz4-dev
      - libprotobuf-dev
      - libspatialite-dev
      - libsqlite3-dev
      - libsqlite3-mod-spatialite
      - make
      - python3-pyosmium
      - parallel
      - pkgconf
      - protobuf-compiler
      - rsync
      - zlib1g-dev
      - zstd
    state: present

- name: Checkout valhalla source (fresh-host seed only)
  git:
    repo: "{{ valhalla__git_repo }}"
    dest: "{{ valhalla__srcdir }}"
    version: "{{ valhalla__git_version }}"
    depth: "{{ 1 if valhalla__git_version | length != 40 else omit }}"
    single_branch: "{{ valhalla__git_version | length != 40 }}"
    recursive: yes
    # See service.yml for the rationale behind `update: no` + no `force`:
    # avoid wedging submodule state under `.git/modules/` across re-runs.
    # deploy-valhalla.sh handles all subsequent in-repo updates.
    update: no
  become: yes
  become_user: "{{ valhalla__build_user }}"

- name: Build + install valhalla
  command: "{{ valhalla__basedir }}/scripts/deploy-valhalla.sh builder"
  become: yes
  become_user: "{{ valhalla__build_user }}"

# Data prep.

- name: Create data dir
  file:
    path: "{{ valhalla__data_dir }}"
    state: directory
    owner: "{{ valhalla__build_user }}"
    group: "{{ valhalla__user }}"
    mode: "0755"

- name: Download OpenStreetMapSpeeds default_speeds.json
  get_url:
    url: "{{ valhalla__default_speeds_url }}"
    dest: "{{ valhalla__default_speeds_path }}"
    owner: "{{ valhalla__build_user }}"
    group: "{{ valhalla__user }}"
    mode: "0644"

- name: Generate valhalla.json (builder)
  shell:
    cmd: >
      {{ valhalla__prefix }}/bin/valhalla_build_config
      --mjolnir-tile-dir {{ valhalla__tiles_dir }}
      --mjolnir-tile-extract {{ valhalla__extract_path }}
      --mjolnir-timezone {{ valhalla__timezones_path }}
      --mjolnir-admin {{ valhalla__admins_path }}
      --mjolnir-default-speeds-config {{ valhalla__default_speeds_path }}
      --mjolnir-keep-all-osm-node-ids true
      --mjolnir-keep-osm-node-ids true
      --mjolnir-include-platforms true
      --mjolnir-concurrency {{ ansible_facts.processor_vcpus }}
      --additional-data-elevation {{ valhalla__elevation_dir }}
      --statsd-host localhost
      --statsd-port 8125
      > {{ valhalla__config_path }}
    creates: "{{ valhalla__config_path }}"
  environment:
    LD_LIBRARY_PATH: "{{ valhalla__prefix }}/lib"
  become: yes
  become_user: "{{ valhalla__build_user }}"

# NB: planet.pbf is downloaded by the build-tiles iteration script on
# first run (~20 min for the full planet), NOT by ansible — having
# ansible block on the download would make `make valhalla` painfully
# slow on a fresh deploy for no good reason. The iteration script
# uses the same wget --continue + .partial + atomic-mv pattern, so
# the download is resumable across systemd restarts.
