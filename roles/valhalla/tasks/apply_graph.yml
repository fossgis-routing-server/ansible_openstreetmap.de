# SPDX-License-Identifier: MIT
# Service host: receiver-side wiring for graph pushes from the builder.
#   - /opt/valhalla/graph-receiver.sh — forced-command dispatcher (rsync -> rrsync,
#     bare ssh -> apply-graph.sh).
#   - /opt/valhalla/apply-graph.sh — does the rolling swap (decompress tarball,
#     rolling-restart each per-port valhalla_service, healthcheck).
#   - sudoers — passwordless systemctl stop/start for the per-port units.
#   - authorized_key — pin the builder's pubkey to the dispatcher.
---

- name: /opt/valhalla for receiver scripts
  file:
    path: /opt/valhalla
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: graph-receiver.sh dispatcher
  template:
    src: graph-receiver.sh.j2
    dest: /opt/valhalla/graph-receiver.sh
    owner: root
    group: root
    mode: "0755"

- name: apply-graph.sh
  template:
    src: apply-graph.sh.j2
    dest: /opt/valhalla/apply-graph.sh
    owner: root
    group: root
    mode: "0755"

- name: Sudoers — let valhalla-graph stop/start the per-port units
  template:
    src: valhalla-graph.sudoers.j2
    dest: /etc/sudoers.d/valhalla-graph
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"

- name: Authorize builder push key with forced command -> graph-receiver.sh
  authorized_key:
    user: "{{ valhalla__graph_user }}"
    key: "{{ hostvars[groups['valhalla_builder'][0]].valhalla__graph_pubkey }}"
    key_options: 'command="/opt/valhalla/graph-receiver.sh",no-port-forwarding,no-X11-forwarding,no-agent-forwarding,no-pty'
    state: present
    exclusive: yes
