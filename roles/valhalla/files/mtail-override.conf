# Managed by ansible — see roles/valhalla/files/mtail-override.conf
#
# systemd drop-in for the Debian apt-shipped mtail service. Wipes the
# default ExecStart and replaces it so mtail tails the valhalla API log
# and exposes :9145 (matching what routing.earth Prometheus expects from
# the previous nginx-lua-prometheus setup). SupplementaryGroups=adm grants
# read access to /var/log/nginx/*.
[Service]
ExecStart=
ExecStart=/usr/bin/mtail --port 9145 --progs /etc/mtail --logs /var/log/nginx/valhalla-api.log
SupplementaryGroups=adm
