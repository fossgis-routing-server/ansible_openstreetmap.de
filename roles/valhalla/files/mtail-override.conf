# Managed by ansible — see roles/valhalla/files/mtail-override.conf
#
# systemd drop-in for the Debian apt-shipped mtail service. Wipes the
# default ExecStart and replaces it so mtail tails the nginx valhalla-api log
# and exposes :9145. SupplementaryGroups=adm grants read access to /var/log/nginx/*.
#
# The Debian unit also has `ExecCondition=/usr/bin/test -n ${LOGS}` so it
# skips unless /etc/default/mtail sets LOGS=. We bake the log path into our
# ExecStart and don't use /etc/default/mtail at all, so null the condition.
[Service]
ExecCondition=
ExecStart=
ExecStart=/usr/bin/mtail --port 9145 --progs /etc/mtail --logs /var/log/nginx/valhalla-api.log
SupplementaryGroups=adm
