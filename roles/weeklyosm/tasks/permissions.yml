# SPDX-License-Identifier: MIT
---
- name: "Install rsync package"
  ansible.builtin.package:
    name: rsync
    state: present

- name: "Deploy rsync-restriction script (rrsync)"
  ansible.builtin.shell: |
    # find rrsync
    RRSYNC_SRC=$(find /usr/share/doc/rsync -name "rrsync.gz" | head -n 1)
    if [ -n "$RRSYNC_SRC" ]; then
      gunzip -c "$RRSYNC_SRC" > /usr/bin/rrsync
      chmod +x /usr/bin/rrsync
    elif [ -f "/usr/share/doc/rsync/scripts/rrsync" ]; then
      # already uncompressed, e.g. on Debian/Ubuntu
      cp /usr/share/doc/rsync/scripts/rrsync /usr/bin/rrsync
      chmod +x /usr/bin/rrsync
    fi
  args:
    creates: /usr/bin/rrsync

- name: "Create upload user for static website"
  ansible.builtin.user:
    name: "{{ weeklyosm_deploy_user }}"
    # Rsync needs a home directory to store the .ssh directory with the authorized_keys file
    create_home: yes
    home: "/srv/weeklyosm/{{ weeklyosm_deploy_user }}"
    shell: /bin/bash

- name: "Create target directory"
  ansible.builtin.file:
    path: "{{ weeklyosm_directory }}"
    state: directory
    owner: "{{ weeklyosm_deploy_user }}"
    group: "www-data"
    mode: 755

- name: "Install public key with rsync restriction"
  ansible.posix.authorized_key:
    user: "{{ weeklyosm_deploy_user }}"
    # The key is automatically placed in /srv/weeklyosm/{{ weeklyosm_deploy_user }}/.ssh/authorized_keys
    key: >
      command="/usr/bin/rrsync {{ weeklyosm_directory
      }}",no-agent-forwarding,no-port-forwarding,no-pty {{ weeklyosm_deploy_key
      }}
    state: present
