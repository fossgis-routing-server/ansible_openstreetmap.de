{% call server(weeklyosm.hostnames, http='forward', https='weeklyosm') %}

    <FilesMatch "\.(cgi|shtml|phtml|php)$">
        SSLOptions +StdEnvVars
    </FilesMatch>
    <Directory /usr/lib/cgi-bin>
        SSLOptions +StdEnvVars
    </Directory>

    ServerAdmin blog@openstreetmap.de

    DocumentRoot {{ weeklyosm_directory }}
    <Directory />
        Options FollowSymLinks
        AllowOverride None
    </Directory>
    <Directory {{ weeklyosm_directory }}>
        Options -Indexes
        Options FollowSymLinks MultiViews
        AllowOverride All
        Order allow,deny
        allow from all
    </Directory>

    {{ custom_log('weeklyosm') }}

    # Possible values include: debug, info, notice, warn, error, crit,
    # alert, emerg.
    LogLevel warn
{% endcall %}
