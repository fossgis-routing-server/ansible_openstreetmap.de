- name: Create umap system account
  system_account:
    name: "{{ umap__user }}"
    home: "{{ umap__paths.host.basedir }}"

- name: Install prerequisites
  apt:
    name:
      - ca-certificates
      - curl
      - wget
      - git

- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker GPG apt Key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Add Docker Repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian trixie stable"
    state: present

- name: Install Docker and Docker Compose
  apt:
    name:
      - docker-ce
      - docker-compose-plugin
    state: latest

- name: Add users to docker group
  user:
    name: "{{ item }}"
    groups: docker
    append: yes
  loop: "{{ [umap__user] + (users | default([]) | map(attribute='name') | list) }}"
  when: "item in accounts__active | default([]) or item == umap__user"

- name: Setup umap config file
  template:
    src: "umap.conf.jinja"
    dest: "{{ umap__paths.host.basedir }}/umap.conf"
    owner: "{{ umap__user }}"
    group: docker
    mode: "0664"


- name: Create umap directories
  file:
    path: "{{ umap__paths.host.basedir }}/{{ item }}"
    state: directory
    owner: "{{ umap__user }}"
    group: docker
    mode: "0775"
  loop:
    - sockets

- name: Create umapdata directories
  file:
    path: "{{ umap__paths.host.basedir }}/umapdata/{{ item }}"
    state: directory
    owner: "{{ umap__user }}"
    group: docker
    mode: "0775"
  loop:
    - static_root
    - media_root
    - symbols

- name: Setup docker-compose file
  template:
    src: "umap_docker-compose.yml.jinja"
    dest: "{{ umap__paths.host.basedir }}/docker-compose.yml"
    owner: "{{ umap__user }}"
    group: docker
    mode: "0664"

- name: Setup nginx-docker.conf for proxy
  template:
    src: "nginx-docker.conf.jinja"
    dest: "{{ umap__paths.host.basedir }}/nginx-docker.conf"
    owner: "{{ umap__user }}"
    group: docker
    mode: "0664"

- name: Copy WSGI Dockerfile
  copy:
    src: "Dockerfile"
    dest: "{{ umap__paths.host.basedir }}/Dockerfile"
    owner: "{{ umap__user }}"
    group: docker
    mode: "0664"

- name: Copy .dockerignore file
  copy:
    src: ".dockerignore"
    dest: "{{ umap__paths.host.basedir }}/.dockerignore"
    owner: "{{ umap__user }}"
    group: docker
    mode: "0664"

- name: Copy entrypoint script
  copy:
    src: "entrypoint.sh"
    dest: "{{ umap__paths.host.basedir }}/entrypoint.sh"
    owner: "{{ umap__user }}"
    group: docker
    mode: "0755"

- name: Copy favicon files
  copy:
    src: "favicon/{{ item }}"
    dest: "{{ umap__paths.host.basedir }}/umapdata/static_root/{{ item }}"
    owner: "{{ umap__user }}"
    group: docker
    mode: "0644"
  loop:
    - favicon.ico
    - favicon.svg
    - favicon-96x96.png
    - apple-touch-icon.png
    - site.webmanifest
    - web-app-manifest-192x192.png
    - web-app-manifest-512x512.png

- name: Create custom directories
  file:
    path: "{{ umap__paths.host.basedir }}/umapdata/custom/{{ item }}"
    state: directory
    owner: "{{ umap__user }}"
    group: docker
    mode: "0775"
  loop:
    - templates
    - templates/umap
    - static
    - static/umap
    - static/umap/css

- name: Deploy custom website files
  copy:
    src: "custom_website/"
    dest: "{{ umap__paths.host.basedir }}/umapdata/custom/"
    owner: "{{ umap__user }}"
    group: docker
    mode: "0644"
    directory_mode: "0775"

- name: Setup umap db env file
  template:
    src: "{{ item }}.jinja"
    dest: "{{ umap__paths.host.basedir }}/{{ item }}"
    owner: "{{ umap__user }}"
    group: docker
    mode: "0664"
  loop:
    - database.env

- name: Ensure Docker service is started
  systemd:
    name: docker
    state: started
    enabled: yes

- name: Run Docker Compose up as user "{{ umap__user }}"
  become: true
  become_user: "{{ umap__user }}"
  command: docker compose -f "{{ umap__paths.host.basedir }}"/docker-compose.yml up -d
  args:
    chdir: "{{ umap__paths.host.basedir }}"
  environment:
    COMPOSE_HTTP_TIMEOUT: 200

- name: Setup umap nginx site
  nginx_site:
    site: '000-umapde'
    src:  'nginx-host.conf.jinja'
  notify: reload nginx

- name: Ensure nginx service is started
  service:
    name: nginx
    state: started
    enabled: yes

