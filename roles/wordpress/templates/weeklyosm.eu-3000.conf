<VirtualHost 127.0.0.1:3000>

    {% for fqdn in wordpress.hostnames -%}
    {% if loop.first %}ServerName{% else %}ServerAlias{% endif %} {{ fqdn }}
    {% endfor %}

    ServerAdmin blog@openstreetmap.de

    <FilesMatch "\.(cgi|shtml|phtml|php)$">
        SSLOptions +StdEnvVars
    </FilesMatch>
    <Directory /usr/lib/cgi-bin>
        SSLOptions +StdEnvVars
    </Directory>

    DocumentRoot /var/www/wordpress/

    <Directory />
        Options FollowSymLinks
        AllowOverride None
    </Directory>
    <Directory /var/www/wordpress/>
        Options -Indexes
        Options FollowSymLinks MultiViews
        AllowOverride All
        Order allow,deny
        allow from all
    </Directory>

    Alias /wp-uploads/ /var/www/wordpress/wp-content/uploads/
    <Directory /var/www/wordpress/wp-content/uploads/>
        Options -Indexes
        Options FollowSymLinks MultiViews
        AllowOverride None
        Order allow,deny
        allow from all
        AddType text/plain .html .htm .shtml
        <FilesMatch ".+\.ph(ar|p|tml)$">
          SetHandler None
        </FilesMatch>
    </Directory>

    Include /etc/apache2/conf-available/php8.2-fpm.conf

    <IfModule mod_php7.c>
        php_admin_value open_basedir /usr/share/php/:/usr/share/pear/:/etc/wordpress/:/var/www/wordpress/:/var/lib/wordpress/wp-content/:/tmp/:/usr/share/wordpress/
        php_admin_value disable_functions exec,shell_exec,system,passthru,popen,proc_open
    </IfModule>

    {{ custom_log('wordpress') }}

    RemoteIPHeader X-Real-IP
    RemoteIPTrustedProxy 127.0.0.1/32

    # Possible values include: debug, info, notice, warn, error, crit,
    # alert, emerg.
    LogLevel warn

</VirtualHost>

