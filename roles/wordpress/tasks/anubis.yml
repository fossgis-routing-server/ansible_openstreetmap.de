---
- name: Install anubis
  ansible.builtin.apt:
    deb: "{{ anubis__packageuri }}"
  tags:
    - anubis

- name: Create instance env files
  ansible.builtin.template:
    src: "anubis.env.j2"
    dest: "/etc/anubis/{{ __instance.name }}.env"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ anubis__instances }}"
  loop_control:
    loop_var: __instance
  notify:
    - Anubis restart
  tags:
    - anubis

- name: Create instance botPolicy files
  ansible.builtin.template:
    src: "botPolicies.yaml.j2"
    dest: "/etc/anubis/{{ __instance.name }}.botPolicies.yaml"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ anubis__instances }}"
  loop_control:
    loop_var: __instance
  notify:
    - Anubis restart
  tags:
    - anubis

- name: Create systemd units for anubis instances
  ansible.builtin.systemd_service:
    name: "anubis@{{ __instance.name }}"
    enabled: true
    state: started
  loop: "{{ anubis__instances }}"
  loop_control:
    loop_var: __instance
  notify:
    - Anubis restart
  tags:
    - anubis

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
  tags:
    - anubis
