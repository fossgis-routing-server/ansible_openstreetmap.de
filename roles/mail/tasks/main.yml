---
- name: Install Postfix
  apt:
    name: [postfix]

- name: set /etc/mailname
  copy:
    dest: /etc/mailname
    owner: root
    group: root
    mode: 0644
    content: |
      {{ mail.mailname }}

- name: 'aliases'
  include_tasks: write_and_hash.yml
  vars:
    dest: '/etc/aliases'
    key_char: ':'
    alias: "{{ mail.aliases | dict2items | rejectattr('key', 'search', '@') | items2dict }}"
    map: mail.aliases

- name: 'virtual_alias_map'
  include_tasks: write_and_hash.yml
  vars:
    dest: '/etc/postfix/virtual_alias_map'
    key_char: ''
    alias: "{{ mail.aliases | dict2items | selectattr('key', 'search', '@') | items2dict }}"

- name: 'sender canonical map'
  include_tasks: write_and_hash.yml
  vars:
    dest: '/etc/postfix/canonical'
    key_char: ''
    alias: "{{ { '@' ~ ansible_facts['fqdn']: '@' ~ mail.mailname } }}"

- name: Write /etc/postfix/main.cf
  template:
    dest: /etc/postfix/main.cf
    src: main.cf
    owner: root
    group: root
    mode: 0644
  notify:
    - systemctl reload postfix

- name: Write /etc/postfix/master.cf
  copy:
    dest: /etc/postfix/master.cf
    src: master.cf
    owner: root
    group: root
    mode: 0644
  notify:
    - systemctl reload postfix

- name: Install OpenDKIM
  when: mail.opendkim
  block:
    - name: Install OpenDKIM from APT
      apt:
        name: [opendkim, opendkim-tools]

    - name: Write /etc/opendkim.conf
      copy:
        src: opendkim.conf
        dest: /etc/opendkim.conf
        owner: root
        group: root
        mode: 0644
      notify:
        - systemctl restart opendkim

    - name: Ensure correct permissions on /etc/opendkim
      file:
        state: directory
        path: /etc/opendkim
        owner: root
        group: root
        mode: 0755

    - name: Ensure correct permissions on /etc/opendkim/keys
      file:
        state: directory
        path: /etc/opendkim/keys
        owner: root
        group: opendkim
        mode: 0750
      notify:
        - systemctl restart opendkim

    - name: Create OpenDKIM key
      shell:
        chdir: /etc/opendkim
        cmd: 'opendkim-genkey --selector={{ mail.opendkim_selector }} --bits=2048 --directory=keys'
        creates: /etc/opendkim/keys/{{ mail.opendkim_selector }}.private
      register: opendkim_key_creation

    - name: Make OpenDKIM key readable for user opendkim
      when: opendkim_key_creation.changed
      file:
        path: '/etc/opendkim/keys/{{ item }}'
        owner: opendkim
        group: root
        mode: 0600
      loop:
        - '{{ mail.opendkim_selector }}.private'
        - '{{ mail.opendkim_selector }}.txt'

    - name: Print public OpenDKIM key
      when: opendkim_key_creation.changed
      block:
        - slurp:
            src: /etc/opendkim/keys/{{ mail.opendkim_selector }}.txt
          register: opendkim_public_key
        - debug:
            msg: 'Please publish the following DNS entry with your public DKIM key:\n{{ opendkim_public_key }}'

    - name: Write /etc/opendkim/keytable
      copy:
        dest: /etc/opendkim/keytable
        owner: root
        group: root
        mode: 0644
        content: |
          default    %:{{ mail.opendkim_selector }}:/etc/opendkim/keys/{{ mail.opendkim_selector }}.private
      notify:
        - systemctl restart opendkim

    - name: Write /etc/opendkim/signingtable
      copy:
        dest: /etc/opendkim/signingtable
        owner: root
        group: root
        mode: 0644
        content: |
          *@{{ mail.mailname}} default
          {% for item in mail.domains %}
          *@{{ item }} default
          {% endfor %}
      notify:
        - systemctl restart opendkim

    - name: Create /var/spool/postfix/opendkim
      file:
        path: /var/spool/postfix/opendkim
        owner: opendkim
        group: opendkim
        mode: 0755
        state: directory

    - name: Add Postfix to opendkim group
      user:
        append: yes
        name: postfix
        groups: opendkim

- name: Install sasl auth
  when: mail.relay | default(False)
  block:
    - name: Install saslauth from APT
      apt:
        name: [libsasl2-modules, sasl2-bin]

    - name: Write /etc/postfix/sasl/smtpd.conf
      copy:
        dest: /etc/postfix/sasl/smtpd.conf
        owner: root
        group: root
        mode: 0644
        content: |
          pwcheck_method: auxprop
          auxprop_plugin: sasldb
          mech_list: plain login
      notify:
        - systemctl restart postfix

    - name: Clear sasldb2
      file:
        path: /etc/sasldb2
        state: absent

    - name: Add users to sasldb2
      command:
        cmd: "saslpasswd2 -c -u {{ mail.mailname }} {{ item.key }}"
        stdin: "{{ item.value }}"
      loop: "{{ mail_users | dict2items }}"

    - name: Add /etc/sasldb2 to postfix chroot
      replace:
        path: /usr/lib/postfix/configure-instance.sh
        regexp: 'etc/host.conf etc/nsswitch.conf etc/nss_mdns.config"$'
        replace: 'etc/host.conf etc/nsswitch.conf etc/nss_mdns.config etc/sasldb2"'
      notify:
        - systemctl restart postfix

    - name: 'ufw: allow smtp submission'
      ufw:
        comment: 'allow submission'
        rule: allow
        name: "Mail submission"
