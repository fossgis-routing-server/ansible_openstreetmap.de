# Vagrant test VM for the valhalla builder role. Pairs with valhalla-service
# on a shared libvirt private_network (see Vagrantfile).

# SSH target for graph push and apply-graph trigger. The builder VM has
# no DNS for the production hostnames, so override to the service VM's
# private_network IP. Note: this only changes graph_push_target, NOT
# api_hostname — that stays at the production value so nginx server_name
# on the service VM doesn't collide with web_hostname.
valhalla__graph_push_target: 192.168.123.10

valhalla__planet_url: https://download.geofabrik.de/europe/liechtenstein-latest.osm.pbf

# sleep in between graph build iterations, liechtenstein builds in seconds.
valhalla__build_loop_sleep_seconds: 300

# Disable the prometheus exporters in vagrant — no scraper IP set, no
# external scrape happening. (The role asserts on valhalla__prometheus_scraper_ip
# when this is true; the exporter install + ufw rule tasks both apply on
# the builder too, hence the override here in addition to valhalla-service.)
valhalla__ext_prometheus_in_use: false
