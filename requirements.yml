---
collections:
  # Required by roles/postgresql (postgresql_user, postgresql_db, etc.).
  # Even when postgresql isn't in the active play, ansible parses all
  # role tasks at site.yml load time, so the collection must be present.
  - name: community.postgresql

roles:
  - name: fossgis.icinga2_install
    src: https://gitlab.fossgis.de/ansible/roles/fossgis.icinga2_install
    version: main
    scm: git

  - name: fossgis.icinga2_nodesetup
    src: https://gitlab.fossgis.de/ansible/roles/fossgis.icinga2_nodesetup
    version: main
    scm: git

  - name: fossgis.icinga2_install_customchecks
    src: https://gitlab.fossgis.de/ansible/roles/fossgis.icinga2_install_customchecks
    version: main
    scm: git

  - name: fossgis.icinga2_agent_config
    src: https://gitlab.fossgis.de/ansible/roles/fossgis.icinga2_agent_config
    version: main
    scm: git

  - name: fossgis.icinga2_usercert
    src: https://gitlab.fossgis.de/ansible/roles/fossgis.icinga2_usercert
    version: main
    scm: git

